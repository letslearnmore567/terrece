kind = "web"
previewPath = "/"
title = "Smart Terrace Farming System"
version = "1.0.0"
id = "artifacts/smart-terrace"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18434
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/smart-terrace run dev"

[services.env]
PORT = "18434"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/smart-terrace", "run", "build"]
publicDir = "artifacts/smart-terrace/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
